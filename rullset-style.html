<!DOCTYPE html>
<html>
    <head> 
        <title> Rullset-style </title>
        <style> 
        h1,h2, h3, h4{
            font-size: 30px;
            color: blue;
        }
        h2 {
            font-size: 25px;
            background-color: rgb(232, 248, 199);
            color: rgb(67, 47, 114);
            /* color: rgb(67, 47, 114); */
        }
        .important {
            font-size: 30px;
            background-color: rgb(0, 136, 154);
            color: rgb(83, 78, 129);
        }
        #theOne {
            color: red;
        }
        </style>
    </head>
    <body > 
        <h1> Heading 1 </h1>
        <h2> Heading 2 </h2>
        <h3> Heading <span id="theOne"> Three </span> </h3>
        <h4 class="important"> Heading 4 </h4>
    </body>
</html>
